<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><span class="net">Netflix</span></li>
                <li><input type="button" class="sign" value="Sign in"></li>
            </ul>
        </nav>
    </header>
    <!-- Hero section -->
    <header class="curve">
        <section>
        <div class="content">
            <h3>Unlimited movies, TV shows, <br>and more</h3>
            <p>Starts at Rs 250. Cancel anytime.</p>
            <br>
            <p>Ready to watch? Enter your email to create or restart your <br>membership.</p>
            <br>
            <input type="email" id="mail" placeholder="Email">
            <input type="button" class="start" value="Get Started">
        </div>
    </section>
    </header>

    <!-- Lower hero section -->
    <main>
        <div class="contain">
            <section class="trending">
            <h2 class="tre">Trending Now</h2>
            <div class="area">
                <div class="card-1">
                    <img src="download (1).jpg" alt="one piece">
                </div>
                <div class="card-2">
                    <img src="dhurrandar-2.png" alt="dhurrandar">
                </div>
                <div class="card-3">
                    <img src="download.webp" alt="war machine">
                </div>
            </div>
        </section>
        </div>
    </main>
</body>
</html>
