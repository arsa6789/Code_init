<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><span class="net">Netflix</span></li>
                <li><input type="button" class="sign" value="Sign in"></li>
            </ul>
        </nav>
    </header>
    <section>
        <div class="content">
            <h3>Unlimited movies, TV shows, <br>and more</h3>
            <p>Starts at Rs 250. Cancel anytime.</p>
            <br>
            <p>Ready to watch? Enter your email to create or restart your <br>membership.</p>
            <br>
            <input type="email" id="mail" placeholder="Email">
            <input type="button" class="start" value="Get Started">
        </div>
    </section>
</body>
</html>
