<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deafult-Shit</title>
</head>
<style>
    body{
        background: #7c7c7c;
        box-sizing: border-box;
        animation-name: bc;
        animation-duration: 3s;
    }
    .center{
        display: flex;
        justify-content: center;
        align-items: center;
        margin-top: 10rem;
        animation-name: box-align;
        animation-duration: 3s;
    }
    .box{
        width: 30vw;
        height: 50vh;
        background-color: rgb(52, 52, 52);
        border-radius: 50px;
        animation-name: box;
        animation-duration: 3s;
    }
    p{
        opacity: 1;
        display: inherit;
        justify-content: center;
        text-align: center;
        align-items: center;
        padding-top: 5rem;
        font-family: sans-serif;
        font-size: 30px;
        color: white;
        animation-name: tfont;
        animation-duration: 2s;
    }
    @keyframes bc{
        from{background-color: #fff;}
        to{background-color: #7c7c7c;}
    }
    @keyframes box{
        from{width: 0vw; height: 0vh;background-color: #fff;border-radius: 0px;}
        to{width: 30vw;height: 50vh;background-color: rgb(52, 52, 52);border-radius: 50px;}
    }
    @keyframes box-align{
        from{display: flex;justify-content: none;align-items: normal;margin-top: 0rem;}
        to{display: flex;justify-content: center;align-items: center;margin-top: 10rem;}
    }
    @keyframes tfont{
        from{opacity: 0;font-size: 0px;}
        to{opacity: 1;font-size: 30px;}
    }
</style>
<body>
    <div class="center">
        <div class="box">
            <p>Abdul Rehman</p>
        </div>
    </div>
</body>
</html>
