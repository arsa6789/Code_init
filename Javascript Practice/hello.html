<html>
    <head>
        <title>javasctipt saying hello</title>
    </head>
    <body>
        <h1>Hello</h1>
        <button onclick="hello()">Click me</button>
        <script>
            function hello(){
                let heading = document.querySelector("h1");

                if(heading.innerHTML  === "Hello"){
                    heading.innerHTML = "Goodbye!";
                }else{
                    heading.innerHTML = "Hello";
                }
            }
        </script>
    </body>
</html>
