<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfect Square checker</title>
</head>

<body>
    <script>
        const numb = prompt("Enter a number");
        const root = Math.sqrt(numb);

        if (root === Math.floor(root)) {
            document.write("Correct!"+ " "+ "Your root number is:"+ " " + root);
        }
        else {
            document.write("GetOut" + " "+ "Your root number is:"+ " " + root)
        }
    </script>
</body>

</html>
