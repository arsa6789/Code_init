<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For loop JavaScript</title>
</head>

<body>
    <script>
        let i = "";

        let result = "";

        for (let i = 1; i <= 6; i += 6) {
            result += (i + 2) + " ";
        }
        document.write(result)
    </script>
</body>

</html>
